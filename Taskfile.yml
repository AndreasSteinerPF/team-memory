version: '3'
tasks:
  build:     { desc: 'Compile everything', cmds: ['go build ./...'] }
  test:      { desc: 'Default suite (no live CLIs needed)', cmds: ['go test ./...'] }
  test:unit: { desc: 'Internal unit tests only', cmds: ['go test ./internal/...'] }

  # Harness E2E default tiers — committed fixtures, no live CLIs.
  test:harness:           { desc: 'All default harness tiers', cmds: ['go test ./e2e/harness/...'] }
  test:harness:contract:  { desc: 'Wire-format contract tier', cmds: ['go test ./e2e/harness/ -run TestContract'] }
  test:harness:replay:    { desc: 'Engine scenario replay tier', cmds: ['go test ./e2e/harness/ -run TestReplay'] }
  test:harness:packaging: { desc: 'tm init packaging tier', cmds: ['go test ./e2e/harness/ -run TestPackaging'] }
  test:harness:update:    { desc: 'Regenerate render goldens', cmds: ['go test ./e2e/harness/ -run TestContract -update'] }

  ci: { desc: 'What CI runs', cmds: [{ task: build }, { task: test }] }

  # Live-gated — REQUIRE the harness CLIs installed + authenticated.
  test:harness:live:
    desc: 'Live firing tier (needs harness CLIs)'
    cmds: ['go test -tags harness_live ./e2e/harness/ -run TestLive']
  setup:codex-live:
    desc: 'Scaffold the codex live-test repo (set TM_CODEX_LIVE_REPO; then trust it once via `codex`)'
    cmds: ['go test -tags harness_live ./e2e/harness/ -run TestSetupCodexLiveRepo -v']
  test:harness:live:codex:
    desc: 'Codex live firing (needs TM_CODEX_LIVE_REPO scaffolded + trusted once via `codex`)'
    cmds: ['go test -tags harness_live ./e2e/harness/ -run TestLive/codex -v']
  capture:
    desc: 'Re-capture fixtures for all harnesses'
    env: { TM_CAPTURE_DATE: { sh: 'date -u +%F' } }
    cmds: ['go test -tags harness_live ./e2e/harness/ -run TestCapture']
  'capture:*':
    desc: 'Re-capture one harness, e.g. task capture:codex'
    vars: { H: '{{index .MATCH 0}}' }
    env: { TM_CAPTURE_DATE: { sh: 'date -u +%F' } }
    cmds: ['go test -tags harness_live ./e2e/harness/ -run TestCapture/{{.H}}']
