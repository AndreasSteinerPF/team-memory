# GoReleaser config — cross-compiled `tm` binaries + a GitHub Release on tag push.
# The release is driven by .github/workflows/release.yml (triggered on `v*` tags).
# Validate locally with:  goreleaser check  &&  goreleaser release --snapshot --clean
version: 2

project_name: team-memory

before:
  hooks:
    - go mod tidy

builds:
  - id: tm
    main: ./cmd/tm
    binary: tm
    # modernc.org/sqlite is pure Go, so we cross-compile statically without cgo.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/AndreasSteinerPF/team-memory/internal/cli.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Standard 5 targets: drop windows/arm64.
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: tm
    name_template: "tm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # tar.gz everywhere except Windows, which gets a zip.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# Homebrew tap — commits a tm.rb formula to AndreasSteinerPF/homebrew-tm on each
# release. Users install with: brew install AndreasSteinerPF/tm/tm
# Requires the HOMEBREW_TAP_TOKEN secret (fine-grained PAT with contents:write
# on homebrew-tm and tm-scoop) to be passed in via release.yml.
brews:
  - name: tm
    repository:
      owner: AndreasSteinerPF
      name: homebrew-tm
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/AndreasSteinerPF/team-memory
    description: "Git-backed collaborative memory ledger for coding agents"
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "tm"
    test: |
      system "#{bin}/tm", "version"

# Scoop bucket — commits a tm.json manifest to AndreasSteinerPF/tm-scoop on each
# release. Users install with:
#   scoop bucket add tm https://github.com/AndreasSteinerPF/tm-scoop
#   scoop install tm
scoops:
  - name: tm
    repository:
      owner: AndreasSteinerPF
      name: tm-scoop
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/AndreasSteinerPF/team-memory
    description: "Git-backed collaborative memory ledger for coding agents"
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
