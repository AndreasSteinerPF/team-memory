name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag -a v0.1.0 -m "v0.1.0" && git push origin v0.1.0
# GoReleaser then cross-compiles tm (standard 5 targets), builds archives +
# checksums, and publishes a GitHub Release with an auto-generated changelog.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so the changelog can diff against the previous tag

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
