name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Race detector on Unix (needs a C toolchain on Windows; skip there).
      - name: Test (race)
        if: runner.os != 'Windows'
        run: go test -race ./...

      - name: Test
        if: runner.os == 'Windows'
        run: go test ./...

      # The flagship demo (PRD §12.1 item 12) must stay runnable end-to-end.
      # Gated off Windows: Git Bash's mktemp emits POSIX paths the win32 tm
      # binary resolves inconsistently in the hook's filepath.Abs/Rel, so the
      # check-action steps no-op there. The hook lifecycle itself is covered on
      # Windows by TestCheckActionHookBlocksUntilAcked in the e2e suite.
      - name: Flagship demo script
        if: runner.os != 'Windows'
        run: bash demo/run.sh
