name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Race detector on Unix (needs a C toolchain on Windows; skip there).
      - name: Test (race)
        if: runner.os != 'Windows'
        run: go test -race ./...

      - name: Test
        if: runner.os == 'Windows'
        run: go test ./...
